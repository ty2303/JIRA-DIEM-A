name: Backend CI

on:
  push:
    branches: [main, dev]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    branches: [main, dev]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No backend lint script found, skipping."
          fi

      - name: Run tests
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No backend test script found, skipping."
          fi

      - name: Build
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            npm run build
          else
            echo "No backend build script found, skipping."
          fi

      - name: Smoke test health endpoint
        shell: bash
        run: |
          node src/server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after waiting for backend startup."
          exit 1
